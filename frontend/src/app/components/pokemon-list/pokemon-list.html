<h1>Pokedex</h1>

<div class="pagination-controls">
  <input
    class="search-input"
    type="text"
    placeholder="Buscar por nombre"
    (input)="onSearch($any($event.target).value)"
  />
  <div class="pagination-actions">
    <button (click)="prevPage()" [disabled]="page === 1" aria-label="Anterior">&#9664;</button>
    <span class="page-indicator">Página {{ page }} / {{ totalPages }}</span>
    <button (click)="nextPage()" [disabled]="page === totalPages" aria-label="Siguiente">
      &#9654;
    </button>
    <form class="page-jump" (submit)="goToPage(pageInput.value); $event.preventDefault()">
      <input #pageInput type="number" placeholder="Página" />
    </form>
    <button (click)="goToPage(pageInput.value)">Ir</button>
  </div>
</div>

<div class="pokemon-grid">
  @for (pokemon of pagedPokemons; track pokemon.id) {
  <div class="pokemon-card">
    <img [src]="'/images/' + ('' + pokemon.id) + '.png'" [alt]="pokemon.name" />
    <div class="card-info">
      <span class="card-title">{{ pokemon.id }} - {{ pokemon.name }}</span>
      <div class="card-types">
        <span class="type" [ngClass]="pokemon.type1">{{ pokemon.type1 }}</span>
        @if (pokemon.type2) {
        <span class="type" [ngClass]="pokemon.type2">{{ pokemon.type2 }}</span>
        }
      </div>
    </div>
  </div>
  }
</div>
