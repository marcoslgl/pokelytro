<div class="dialog-container">
  <div class="dialog-actions">
    <button mat-flat-button (click)="onCancel()">Cancel</button>
  </div>
  <h2 class="dialog-title">Replace Pokemon</h2>
  <p class="dialog-subtitle">Replace "{{ data.selectedPokemon.name }}" with a new Pokemon:</p>
  <div class="dialog-list">
    <app-pokemon-list
      [teamDetails]="true"
      [replacePokemon]="true"
      (onReplacePokemon)="onReplace($event)"
    ></app-pokemon-list>
  </div>
</div>
