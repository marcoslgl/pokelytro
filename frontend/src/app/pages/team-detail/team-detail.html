<div class="equipo-detail-container">
  @if (team) {
    <h1>Team Details</h1>
    <section class="equipo-actual">
      <div class="team">
        <div class="team-header">
          @if (!isEditingName) {
            <h3>Details for {{ team.name || 'Team ' + team._id }}</h3>
            <button (click)="onEditName()" class="btn-edit-name">Rename</button>
          } @else {
            <div class="edit-name-form">
              <input [(ngModel)]="newTeamName" placeholder="New team name" class="name-input" />
              <button (click)="onSaveName()" class="btn-save">Save</button>
              <button (click)="onCancelEditName()" class="btn-cancel">Cancel</button>
            </div>
          }
        </div>
        @if (errorMessage) {
          <div class="error-banner">{{ errorMessage }}</div>
        }
        <div class="team-table-wrapper">
          <table mat-table [dataSource]="teamPokemons" class="team-table">
            <ng-container matColumnDef="image">
              <th mat-header-cell *matHeaderCellDef>Image</th>
              <td mat-cell *matCellDef="let pokemon">
                <a
                  class="pokemon-img-link"
                  [routerLink]="['/pokedex', pokemon.id]"
                  title="Open in Pokédex"
                >
                  <img
                    [src]="'/images/' + pokemon.id + '.png'"
                    [alt]="pokemon.name"
                    class="equipo-img"
                  />
                </a>
              </td>
            </ng-container>

            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef>Name</th>
              <td mat-cell *matCellDef="let pokemon">
                <span class="equipo-name">{{ pokemon.id }} - {{ pokemon.name }}</span>
              </td>
            </ng-container>

            <ng-container matColumnDef="types">
              <th mat-header-cell *matHeaderCellDef>Types</th>
              <td mat-cell *matCellDef="let pokemon">
                <div class="pokemon-types">
                  <span class="type" [ngClass]="pokemon.type1">{{ pokemon.type1 }}</span>
                  @if (pokemon.type2) {
                    <span class="type" [ngClass]="pokemon.type2">{{ pokemon.type2 }}</span>
                  }
                </div>
              </td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef>Actions</th>
              <td mat-cell *matCellDef="let pokemon">
                <button mat-flat-button color="primary" (click)="onUpdatePokemon(pokemon)">
                  Replace
                </button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>
        </div>
      </div>
    </section>
  }
</div>
