<section class="home" aria-label="Portada">
  <video
    #homeVideo
    class="home-video"
    muted
    loop
    playsinline
    preload="auto"
    aria-label="Pikachu en bucle"
  >
    <source src="/pikachu_loop.mp4" type="video/mp4" />
    Tu navegador no soporta video HTML5.
  </video>
</section>

@if (loading) {
  <div class="state">Loading pokémon carousel…</div>
} @else if (error) {
  <div class="state state-error">{{ error }}</div>
} @else {
  <div class="carousel">
    <div class="group">
      @for (pokemon of randomPokemons; track pokemon.id) {
        <a routerLink="/pokedex/{{ pokemon.id }}" routerLinkActive="active" class="card">
          <img [src]="'/images/' + pokemon.id + '.png'" [alt]="pokemon.name" />
          <p>{{ pokemon.name }}</p>
        </a>
      }
    </div>

    <div class="group" aria-hidden="true" inert>
      @for (pokemon of randomPokemons; track pokemon.id) {
        <a routerLink="/pokedex/{{ pokemon.id }}" routerLinkActive="active" class="card">
          <img [src]="'/images/' + pokemon.id + '.png'" [alt]="pokemon.name" />
          <p>{{ pokemon.name }}</p>
        </a>
      }
    </div>
  </div>
}
