<section class="home" aria-label="Portada">
  <video
    #pikachuVideo
    class="home-video"
    autoplay
    loop
    playsinline
    preload="metadata"
    aria-label="Pikachu en bucle"
  >
    <source src="/pikachu_loop.mp4" type="video/mp4" />
    Tu navegador no soporta video HTML5.
  </video>
</section>

<section class="carousel" aria-label="Carrusel de Pokémon">
  <header class="carousel-header">
    <h2 class="carousel-title">Descubre Pokémons</h2>
  </header>

  <div class="carousel-body">
    <button type="button" class="carousel-arrow" (click)="prev()" aria-label="Anterior">←</button>

    <div class="carousel-track" role="list">
      <a
        class="carousel-card"
        role="listitem"
        *ngFor="let id of visiblePokemonIds"
        [routerLink]="['/pokedex', id]"
        [attr.aria-label]="'Abrir Pokémon #' + id"
      >
        <img class="carousel-img" [src]="imgSrc(id)" [alt]="'Pokémon #' + id" loading="lazy" />
        <div class="carousel-meta">#{{ id }}</div>
      </a>
    </div>

    <button type="button" class="carousel-arrow" (click)="next()" aria-label="Siguiente">→</button>
  </div>
</section>
